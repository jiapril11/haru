<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오프라인 — Haru</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d1a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 2.5rem;
      letter-spacing: -0.02em;
    }
    .logo span { color: #e94560; }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 1.25rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      max-width: 280px;
      margin-bottom: 2rem;
    }
    button {
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 2rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="logo">Haru<span>.</span></div>
  <div class="icon">📡</div>
  <h1>인터넷에 연결되지 않았어요</h1>
  <p>Haru는 인터넷 연결이 필요해요.<br/>연결 후 다시 시도해주세요.</p>
  <button onclick="location.reload()">다시 시도</button>
</body>
</html>
